cv:
  name: Floragonis
  label: Undergraduate Researcher in Autonomous Driving Perception
  email:
  location: South Korea
  image: ""
  summary: Undergraduate researcher and vehicle engineer working on autonomous driving perception, robust BEV representation, multi-camera calibration, and real-vehicle deployment. My background connects Formula Student vehicle engineering with computer vision research for autonomous driving systems.

  social_networks:
    - network: GitHub
      username: shdragron

  sections:
    Experience:
      - company: Formula Student
        position: Mechanical Analysis Lead Engineer
        location: South Korea
        start_date: 2020
        end_date: 2024
        summary: Led and contributed to vehicle design, manufacturing, structural analysis, and optimization for Formula Student vehicles.
        highlights:
          - Led design, manufacturing, and optimization work for the Forsythia E-Formula Vehicle, Korea's first vehicle featuring a 4WD in-wheel motor drive system with a full monocoque chassis.
          - Contributed to the design and assembly of the RH27 monocoque-based vehicle.
          - Reduced component weight through optimization, including upright 1.3 kg to 0.9 kg and A-arm 9.8 kg to 7.5 kg.
          - Optimized mechanical systems using CATIA and Altair HyperWorks.
          - Conducted structural, thermal, and stress analyses for key vehicle components.
          - Collaborated on carbon composite monocoque and nose cone production using fiberglass molds and autoclave processing.

      - company: Computer Vision for Autonomous Driving
        position: Undergraduate Researcher - Robust BEV Perception
        location: South Korea
        start_date: 2025
        end_date: 2025
        summary: Researched multi-camera calibration and viewpoint-robust BEV semantic segmentation for autonomous driving.
        highlights:
          - Conducted research on multi-camera calibration and multi-view BEV semantic segmentation.
          - Designed and evaluated viewpoint-robust BEV perception pipelines using real-world driving data and CARLA simulation.
          - Analyzed the impact of camera viewpoint changes and calibration errors on BEV model performance.
          - Implemented and trained Cross View Transformer (CVT)-based models for multi-camera perception.
          - Awarded Grand Prize for graduation thesis and poster presentation.

      - company: Computer Vision for Autonomous Driving
        position: Undergraduate Researcher - Driver Behavior Analysis
        location: South Korea
        start_date: 2025
        end_date: 2025
        summary: Studied driver behavior analysis using real-vehicle sensor data and weakly supervised time-series learning.
        highlights:
          - Built an integrated real-vehicle data acquisition environment using CAN, RT2000, PC, and eCon Systems cameras for driver behavior analysis.
          - Applied weakly supervised time-series classification baselines and proposed a novel architecture for multiple-instance time-series driver behavior analysis.
          - Authored a research paper on driver behavior analysis.

      - company: T-CAR Project
        position: Camera Perception Engineer
        location: South Korea
        start_date: 2025
        end_date: 2025
        summary: Contributed to camera perception work for a real-vehicle autonomous driving platform.
        highlights:
          - Performed camera-LiDAR calibration and hardware synchronization.
          - Deployed StreamPETR as the 3D object detection model on the vehicle.
          - Applied TensorRT optimization for real-vehicle deployment.

      - company: Formula Student Driverless
        position: Team Lead
        location: South Korea
        start_date: 2025
        end_date: Present
        summary: Leading driverless Formula Student work from simulator-based perception to real-vehicle preparation.
        highlights:
          - Led LiDAR-based perception for the 1st Korean Formula Student Driverless Competition based on the Formula Student Driverless Simulator.
          - Won 1st place in the 1st Korean Formula Student Driverless Competition.
          - Preparing for the 2nd Formula Student Driverless Competition with a real-vehicle-based project.

      - company: Computer Vision for Autonomous Driving
        position: Undergraduate Researcher - Ongoing Research
        location: South Korea
        start_date: 2026
        end_date: Present
        summary: Preparing research projects on real-vehicle data acquisition, robust 3D object detection, and LiDAR-based reasoning.
        highlights:
          - Preparing a real-vehicle data acquisition project.
          - Studying LiDAR-camera based unsupervised 3D object detection for robustness.
          - Exploring LiDAR LLM approaches for ground reasoning.

    Awards:
      - title: 1st Place Winner
        date: 2025
        awarder: 1st Korean Formula Student Driverless Competition
        summary: Team lead and LiDAR-based perception contributor in a simulator-based Formula Student Driverless competition.

      - title: Grand Prize
        date: 2025
        awarder: Graduation Thesis and Poster Presentation
        summary: Awarded for work on multi-camera calibration and multi-view BEV semantic segmentation for autonomous driving.

      - title: Bronze Prize
        date: 2024
        awarder: Formula Student Korea
        summary: Podium finish.

      - title: Gold Prize
        date:
        awarder: Altair Optimal Design Award
        summary: Awarded for engineering optimization work.

      - title: Silver Prize
        date: 2020
        awarder: KSAE Engineering Design Award
        summary: Engineering design award from KSAE.

      - title: 35th Place
        date:
        awarder: FSAE California
        summary: International Formula Student competition result.

    Projects:
      - name: Multi-camera Calibration and Multi-view BEV Semantic Segmentation
        summary: Research project on robust BEV perception under camera viewpoint changes and calibration errors.
        highlights:
          - Used real-world driving data and CARLA simulation.
          - Implemented and trained CVT-based multi-camera perception models.
          - Evaluated viewpoint robustness and calibration-error sensitivity.

      - name: Multiple Instance Time Series for Driver Behavior Analysis
        summary: Driver behavior analysis project using integrated real-vehicle sensor data.
        highlights:
          - Built a data acquisition system using CAN, RT2000, PC, and eCon Systems cameras.
          - Applied weakly supervised time-series classification baselines.
          - Proposed a novel architecture and authored a research paper.

      - name: T-CAR Real-Vehicle Camera Perception
        summary: Camera perception work for a real-vehicle autonomous driving platform.
        highlights:
          - Camera-LiDAR calibration and hardware synchronization.
          - StreamPETR deployment for 3D object detection.
          - TensorRT optimization for onboard inference.

      - name: Forsythia E-Formula Vehicle
        summary: Formula Student vehicle featuring a 4WD in-wheel motor drive system and full monocoque chassis.
        highlights:
          - Led mechanical analysis, design optimization, and manufacturing contributions.
          - Contributed to carbon composite monocoque and nose cone production.

      - name: Formula Student Driverless
        summary: Driverless Formula Student work spanning LiDAR perception, simulator competition, and real-vehicle preparation.
        highlights:
          - Led the team in the 1st Korean Formula Student Driverless Competition.
          - Responsible for LiDAR-based perception.
          - Won 1st place.

      - name: Ongoing Research Projects
        summary: Research directions in preparation for 2026 and beyond.
        highlights:
          - Real-vehicle data acquisition project.
          - LiDAR-camera based unsupervised 3D object detection for robustness.
          - LiDAR LLM for ground reasoning.

